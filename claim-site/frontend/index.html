<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>領取御守 · Claim · 御守を受け取る｜PIF12</title>
  <style>
    :root {
      --bg: #0b0e14;
      --card: #141823;
      --text: #e8e6e1;
      --muted: #9a968d;
      --gold: #d4af6a;
      --error: #e07a6a;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", -apple-system, "PingFang TC", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(212, 175, 106, 0.25);
      border-radius: 16px;
      max-width: 440px;
      width: 100%;
      padding: 36px 32px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    h1 { font-size: 1.35rem; color: var(--gold); margin: 8px 0 16px; }
    .en { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
    .langbar { display: flex; justify-content: flex-end; gap: 4px; }
    .langbtn {
      width: auto; padding: 4px 10px; margin: 0;
      font-size: 0.74rem; border-radius: 7px;
      background: transparent; color: var(--muted);
      border: 1px solid rgba(212, 175, 106, 0.18);
      cursor: pointer;
    }
    .langbtn.on { color: #1a1505; background: var(--gold); border-color: var(--gold); }
    p { line-height: 1.7; font-size: 0.95rem; margin-bottom: 12px; }
    .muted { color: var(--muted); font-size: 0.83rem; }
    .addr {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.05);
      padding: 8px 12px;
      border-radius: 8px;
      word-break: break-all;
      margin: 12px 0;
    }
    /* Scope our action-button styles to our own card. Privy renders its login
       modal as a body-level portal containing bare <button>/<input> elements; a
       global `button { width:100% }` here leaked in and stretched Privy's email
       submit button across the email input, intercepting mouse clicks. (Tab still
       reached the input — the tell that it was a pointer overlay, not a disabled
       field.) :not(.langbtn) keeps the language switcher unaffected. */
    .card button:not(.langbtn) {
      background: var(--gold);
      color: #1a1505;
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
    .card button:not(.langbtn):disabled { opacity: 0.5; cursor: wait; }
    .error { color: var(--error); }
    a { color: var(--gold); }
    .omamori { font-size: 3rem; margin-bottom: 12px; }
    .note {
      border: 1px solid rgba(212, 175, 106, 0.3);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 18px;
      text-align: left;
    }
    .note-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; }
    .note-body {
      font-family: Georgia, "Songti TC", serif;
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text);
    }
    .seclist { margin: 0; padding-left: 18px; }
    .seclist li { line-height: 1.6; font-size: 0.86rem; margin-bottom: 8px; color: var(--text); }
    .seclist li:last-child { margin-bottom: 0; }
    .receipt {
      border: 1px solid rgba(212, 175, 106, 0.3);
      border-radius: 14px;
      padding: 20px 18px;
      margin-bottom: 16px;
    }
    .receipt-emblem {
      width: 150px; height: 150px; margin: 0 auto 12px;
      background: #1a2030; border-radius: 12px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; color: var(--gold);
      font-family: Georgia, "Songti TC", serif;
    }
    .receipt-omamori { width: 100%; height: 100%; object-fit: contain; display: block; }
    .receipt-title { font-size: 1rem; color: var(--gold); }
    .receipt-sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 14px; }
    .receipt-msg {
      font-family: Georgia, "Songti TC", serif;
      font-size: 0.92rem; line-height: 1.75; color: var(--text);
      border-top: 1px solid rgba(212,175,106,0.2);
      border-bottom: 1px solid rgba(212,175,106,0.2);
      padding: 12px 0; margin-bottom: 14px;
    }
    .receipt-meta { font-size: 0.78rem; text-align: left; margin-bottom: 12px; }
    .receipt-meta div { display: flex; justify-content: space-between; padding: 3px 0; }
    .receipt-meta span { color: var(--muted); }
    .receipt-meta b { font-weight: 500; font-family: ui-monospace, monospace; font-size: 0.74rem; }
    .receipt-link { font-size: 0.8rem; }

    /* Invitation block shown when someone arrives without a valid personal link. */
    .invite-links { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .invite-links a {
      display: block;
      border: 1px solid rgba(212, 175, 106, 0.3);
      border-radius: 10px;
      padding: 11px 14px;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .invite-links a:hover { border-color: var(--gold); background: rgba(212, 175, 106, 0.06); }

    /* Star field — CSS port of the landing page's canvas starfield: gold/white
       points twinkling on the dark ground. Pure CSS, no JS, negligible cost. */
    .starfield {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1.5px 1.5px at 20px 30px, rgba(232, 230, 225, 0.9), transparent),
        radial-gradient(1px 1px at 60px 70px, rgba(212, 175, 106, 0.85), transparent),
        radial-gradient(1.5px 1.5px at 110px 40px, rgba(232, 230, 225, 0.7), transparent),
        radial-gradient(1px 1px at 150px 120px, rgba(232, 230, 225, 0.65), transparent),
        radial-gradient(1px 1px at 90px 160px, rgba(212, 175, 106, 0.7), transparent);
      background-size: 200px 200px;
      background-repeat: repeat;
      animation: twinkle 5.5s ease-in-out infinite;
    }
    .starfield::after {
      content: ""; position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 40px 90px, rgba(232, 230, 225, 0.7), transparent),
        radial-gradient(1px 1px at 130px 30px, rgba(212, 175, 106, 0.6), transparent),
        radial-gradient(1px 1px at 180px 150px, rgba(232, 230, 225, 0.6), transparent);
      background-size: 270px 270px;
      background-repeat: repeat;
      animation: twinkle 8s ease-in-out infinite reverse;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }
    @media (prefers-reduced-motion: reduce) { .starfield, .starfield::after { animation: none; } }
  </style>
</head>
<body>
  <div class="starfield" aria-hidden="true"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
